<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>每晚讀書會｜book-club</title>
<meta name="description" content="每天晚上一本書的深度書摘，像走進一間線上圖書館。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
      --paper: #F7F1E3;
      --ink: #2B2118;
      --ink-soft: #6B5D4F;
      --accent: #8C5A2B;
      --rule: #E4D9C3;
      --card: #FFFBF0;
      --desk: #43362A;
      --desk-ink: rgba(247, 241, 227, 0.7);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --paper: #12160F;
        --ink: #E9E2D0;
        --ink-soft: #A79E8B;
        --accent: #E8B84B;
        --rule: #2A2F24;
        --card: #1A1F15;
        --desk: #080A06;
      }
    }
    html[data-theme="dark"] {
      --paper: #12160F;
      --ink: #E9E2D0;
      --ink-soft: #A79E8B;
      --accent: #E8B84B;
      --rule: #2A2F24;
      --card: #1A1F15;
      --desk: #080A06;
    }
    html[data-theme="light"] {
      --paper: #F7F1E3;
      --ink: #2B2118;
      --ink-soft: #6B5D4F;
      --accent: #8C5A2B;
      --rule: #E4D9C3;
      --card: #FFFBF0;
      --desk: #43362A;
    }
    * { box-sizing: border-box; }
    html { background: var(--desk); }
    body {
      margin: 0;
      background: var(--desk);
      color: var(--ink);
      font-family: "Noto Serif TC", "Songti TC", serif;
      font-size: 19px;
      line-height: 1.9;
      transition: background-color 200ms, color 200ms;
    }
    @media (max-width: 480px) {
      body { font-size: 18px; }
    }
    .sheet {
      background: var(--paper);
      border-radius: 24px;
      margin: clamp(12px, 2.5vw, 28px);
      transition: background-color 200ms;
    }
    .page-shell {
      max-width: 42rem;
      margin: 0 auto;
      padding: clamp(1.25rem, 5vw, 2.5rem);
    }
    .ui-label {
      font-family: "Noto Sans TC", sans-serif;
    }
    #progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      width: 0%;
      background: var(--accent);
      z-index: 100;
    }
    #theme-toggle {
      position: fixed;
      top: 12px;
      right: 12px;
      width: 44px;
      height: 44px;
      min-width: 44px;
      min-height: 44px;
      border: 1px solid var(--rule);
      border-radius: 999px;
      background: var(--paper);
      color: var(--ink);
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
      transition: background-color 200ms, color 200ms;
    }
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.6em;
      font-size: 0.85rem;
      color: var(--ink-soft);
      margin-bottom: 24px;
    }
    .theme-chip {
      display: inline-block;
      border: 1.5px solid var(--rule);
      border-radius: 999px;
      padding: 0.15em 0.9em;
    }
    h1 {
      font-weight: 400;
      font-size: clamp(2.2rem, 6vw, 3.4rem);
      line-height: 1.05;
      margin: 0 0 8px;
    }
    .title-en {
      font-size: 1rem;
      color: var(--ink-soft);
      margin: 0 0 24px;
    }
    .byline {
      font-family: "Noto Sans TC", sans-serif;
      color: var(--ink-soft);
      font-size: 0.95rem;
      margin: 0 0 24px;
    }
    .hook {
      font-weight: 700;
      margin: 0 0 48px;
    }
    h2 {
      font-size: 1.35rem;
      margin: 48px 0 24px;
    }
    h3 {
      font-size: 1.1rem;
      margin: 32px 0 16px;
    }
    p, ul, ol {
      margin: 0 0 24px;
    }
    ul, ol {
      padding-left: 1.4em;
    }
    li {
      margin-bottom: 0.5em;
    }
    section {
      margin-bottom: 8px;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 200ms;
    }
    a:hover {
      border-bottom-color: var(--accent);
    }
    .card-section {
      background: var(--card);
      border-left: 3px solid var(--accent);
      border-radius: 10px;
      padding: clamp(1rem, 4vw, 1.5rem);
      margin: 48px 0;

      margin-top: 24px;

      font-weight: 700;
      border-bottom: none;

    .tg-button:hover {

    footer {

      padding: 0 clamp(1.25rem, 5vw, 2.5rem);

      font-size: 0.9rem;
      text-align: center;

    }
    footer p {
      margin: 0;
    }
    footer a {

    }
    footer a:hover {
      border-bottom-color: var(--desk-ink);
    }
    .empty-state {
      color: var(--ink-soft);

      list-style: none;
      padding: 0;
      margin: 0;

      border-bottom: 1px solid var(--rule);
      padding: 16px 0;
      margin: 0;
    }
    .archive-list .archive-date {
      font-family: "Noto Sans TC", sans-serif;
      font-size: 0.85rem;
      color: var(--ink-soft);
      display: block;
      margin-bottom: 4px;
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition: none !important;

    }
</style>
<style>

    .shelf-controls {

      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }
    .theme-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;

    .filter-chip {
      font-family: "Noto Sans TC", sans-serif;
      font-size: 0.9rem;
      min-height: 44px;
      padding: 0.4em 1em;
      border: 1.5px solid var(--rule);
      border-radius: 999px;
      background: transparent;

    .shelf-search {

      font-size: 16px;

      min-width: 200px;
      flex: 0 1 240px;
      padding: 0.4em 1em;
      border: 1px solid var(--rule);
      border-radius: 10px;
      background: var(--paper);
      color: var(--ink);
    }
    .shelf-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 24px;
    }
    .shelf-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .book-cover-link {
      display: block;
      width: 100%;
      border-bottom: none;
    }
    .book-cover-link:hover {
      border-bottom: none;
    }
    .book-cover {
      container-type: inline-size;
      position: relative;
      width: 100%;
      max-width: clamp(140px, 22vw, 180px);
      aspect-ratio: 2 / 3;
      margin: 0 auto;
      border-radius: 6px;
      padding: 14px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      text-align: center;
      transition: filter 200ms, transform 200ms;
    }
    .book-cover-link:hover .book-cover {
      transform: translateY(-4px);
      filter: brightness(0.95);
    }
    .cover-growth { background: var(--theme-growth); }
    .cover-career { background: var(--theme-career); }
    .cover-people { background: var(--theme-people); }
    .cover-logic { background: var(--theme-logic); }
    .cover-rule {
      position: absolute;
      top: 14px;
      left: 12px;
      right: 12px;
      height: 1px;
      background: color-mix(in srgb, var(--paper) 30%, transparent);
    }
    .cover-title {
      font-family: "Noto Serif TC", "Songti TC", serif;
      font-weight: 700;
      font-size: clamp(0.85rem, 9cqi, 1.05rem);
      line-height: 1.35;
      color: var(--book-cover-text);
      margin-top: 20px;
    }
    .cover-author {
      font-size: 0.7rem;
      color: color-mix(in srgb, var(--book-cover-text) 85%, transparent);
    }
    .cover-tag, .cover-date-on-cover {
      font-size: 0.68rem;
      color: color-mix(in srgb, var(--book-cover-text) 75%, transparent);
      margin-bottom: 4px;
    }
    .cover-spine {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 4px;
      border-radius: 0 6px 6px 0;
    }
    .cover-growth .cover-spine { background: color-mix(in srgb, var(--theme-growth) 80%, black); }
    .cover-career .cover-spine { background: color-mix(in srgb, var(--theme-career) 80%, black); }
    .cover-people .cover-spine { background: color-mix(in srgb, var(--theme-people) 80%, black); }
    .cover-logic .cover-spine { background: color-mix(in srgb, var(--theme-logic) 80%, black); }
    .book-cover.is-upcoming {
      opacity: 0.55;
    }
    .shelf-item.is-upcoming-item {
      cursor: default;
    }
    .shelf-date {
      font-family: "Noto Sans TC", sans-serif;
      font-size: 0.8rem;
      color: var(--ink-soft);
      margin-top: 8px;
    }
    @media (max-width: 480px) {
      .shelf-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
</style>
</head>

<script>
(function () {
      var root = document.documentElement;
      var saved = localStorage.getItem('theme');
      if (saved) root.setAttribute('data-theme', saved);
      var btn = document.getElementById('theme-toggle');
      function isDark() {
        var attr = root.getAttribute('data-theme');
        if (attr === 'dark') return true;
        if (attr === 'light') return false;
        return matchMedia('(prefers-color-scheme: dark)').matches;
      }
      function setIcon() { btn.textContent = isDark() ? '☀' : '☾'; }
      setIcon();
      btn.addEventListener('click', function () {
        var next = isDark() ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        setIcon();
      });
      var bar = document.getElementById('progress-bar');
      window.addEventListener('scroll', function () {
        var h = document.documentElement;
        var max = h.scrollHeight - h.clientHeight;
        bar.style.width = (max > 0 ? (h.scrollTop / max) * 100 : 0) + '%';
      });
    })();
</script>
<script>
(function () {
      var search = document.getElementById('shelf-search');
      var chips = document.querySelectorAll('.filter-chip');
      var items = document.querySelectorAll('.shelf-item[data-theme]');
      var empty = document.getElementById('shelf-empty');
      var activeTheme = 'all';
      function apply() {
        var q = (search.value || '').trim().toLowerCase();
        var visible = 0;
        items.forEach(function (item) {
          var matchTheme = activeTheme === 'all' || item.getAttribute('data-theme') === activeTheme;
          var matchSearch = !q || item.getAttribute('data-search').indexOf(q) !== -1;
          var show = matchTheme && matchSearch;
          item.style.display = show ? '' : 'none';
          if (show) visible++;
        });
        if (empty) empty.hidden = visible !== 0;
      }
      chips.forEach(function (chip) {
        chip.addEventListener('click', function () {
          chips.forEach(function (c) { c.classList.remove('is-active'); });
          chip.classList.add('is-active');
          activeTheme = chip.getAttribute('data-filter-theme');
          apply();
        });
      });
      if (search) search.addEventListener('input', apply);
      apply();
    })();
</script>
